<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Работает везде!</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; }
        #chat { width: 90%; max-width: 500px; height: 70vh; border: 1px solid #333; overflow-y: auto; padding: 20px; background: #252525; margin-top: 20px; border-radius: 10px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; line-height: 1.4; }
        .user { background: #007bff; margin-left: 20%; text-align: right; }
        .ai { background: #333; border-left: 4px solid #00ff88; margin-right: 20%; }
        .input-area { width: 90%; max-width: 500px; display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 12px; background: #00ff88; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .typing { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h2>🤖 AI Assistant</h2>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси что угодно..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        // Твой API ключ
        const API_KEY = "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";
        
        // Используем бесплатный CORS прокси который работает всегда
        const PROXY = "https://api.allorigins.win/raw?url=";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        
        const chatBox = document.getElementById('chat');
        const inputField = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            inputField.disabled = true;
            btn.disabled = true;
            
            addMessage(text, 'user');
            addTypingIndicator();

            try {
                // Отправляем через прокси который решает проблему CORS
                const response = await fetch(PROXY + encodeURIComponent(API_URL), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "mixtral-8x7b-32768",
                        messages: [
                            { role: "system", content: "Ты полезный ассистент. Отвечай на русском языке кратко и по делу." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                // Прокси возвращает ответ, но нужно обработать особый формат
                const proxyData = await response.json();
                
                // Парсим ответ от прокси
                let aiResponse;
                if (typeof proxyData === 'string') {
                    aiResponse = proxyData;
                } else if (proxyData.choices) {
                    aiResponse = proxyData.choices[0].message.content;
                } else {
                    throw new Error('Неожиданный формат ответа');
                }
                
                removeTypingIndicator();
                addMessage(aiResponse, 'ai');

            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage("⚠️ Сервис временно недоступен. Попробуй еще раз через минуту.", 'ai');
            } finally {
                inputField.disabled = false;
                btn.disabled = false;
                inputField.focus();
            }
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'msg ai typing';
            div.innerText = '✍️ Печатает...';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #0f0f1a;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-header {
            background: #1a1a2e;
            color: #00ff88;
            padding: 20px 24px;
            text-align: center;
            font-size: 1.4em;
            font-weight: bold;
            border-bottom: 2px solid #00ff88;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            animation: slideIn 0.3s ease;
            word-wrap: break-word;
            line-height: 1.4;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message.ai {
            background: #1e1e2e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid #2a2a3e;
        }
        .message.error {
            background: #dc3545;
            color: white;
            align-self: center;
            font-size: 0.9em;
        }
        .typing-indicator {
            background: #1e1e2e;
            color: #888;
            align-self: flex-start;
            padding: 12px 18px;
            border-radius: 20px;
            display: inline-flex;
            gap: 4px;
            border: 1px solid #2a2a3e;
        }
        .typing-indicator span {
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        .input-area {
            padding: 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3e;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #2a2a3e;
            border-radius: 30px;
            font-size: 1em;
            outline: none;
            background: #0f0f1a;
            color: white;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            border-color: #00ff88;
        }
        .input-area button {
            padding: 14px 32px;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .input-area button:hover {
            transform: scale(1.05);
        }
        .input-area button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 AI Assistant
        </div>
        <div class="chat-messages" id="messages">
            <div class="message ai">Привет! Я работаю на Google Gemini AI. Задай любой вопрос на русском! 🚀</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напиши сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let typingTimeout = null;

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            sendBtn.disabled = true;
            inputField.disabled = true;

            addMessage(text, 'user');
            showTyping();

            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                if (data.response) {
                    hideTyping();
                    addMessage(data.response, 'ai');
                } else {
                    throw new Error('Неожиданный ответ от сервера');
                }

            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage(`❌ ${error.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                inputField.disabled = false;
                inputField.focus();
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        let typingElement = null;
        function showTyping() {
            typingElement = document.createElement('div');
            typingElement.className = 'typing-indicator';
            typingElement.innerHTML = '✍️ AI печатает<span>.</span><span>.</span><span>.</span>';
            messagesDiv.appendChild(typingElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            if (typingElement) typingElement.remove();
            typingElement = null;
        }
    </script>
</body>
</html>
